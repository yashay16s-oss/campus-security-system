<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Campus Security Alert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .card-icon {
            text-align: center;
            margin-bottom: 20px;
        }
        .card-icon i {
            font-size: 48px;
            color: #e74c3c;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 8px; }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i.icon-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 38px 12px 38px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
        }
        input:focus { border-color: #e74c3c; outline: none; }
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            margin-top: 6px;
            background: #eee;
            transition: background 0.3s, width 0.3s;
            width: 0;
        }
        .strength-bar.weak   { background: #e74c3c; width: 33%; }
        .strength-bar.medium { background: #f39c12; width: 66%; }
        .strength-bar.strong { background: #27ae60; width: 100%; }
        .btn {
            width: 100%;
            padding: 13px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #c0392b; }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-danger  { background: #fdf0ef; color: #e74c3c; }
        .alert-success { background: #eafaf1; color: #27ae60; }
        .alert-info    { background: #eaf4fb; color: #2980b9; }
        .email-hint {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .email-hint strong { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-icon">
            <i class="fa-solid fa-key"></i>
        </div>
        <h2>Set New Password</h2>
        {% if email %}
        <p class="email-hint">Resetting password for <strong>{{ email }}</strong></p>
        {% else %}
        <p class="subtitle">Choose a strong password for your account.</p>
        {% endif %}

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="password" name="password"
                           placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
                    <button type="button" class="toggle-pw" onclick="togglePw('password', this)" aria-label="Toggle password visibility">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <div class="strength-bar" id="strength-bar"></div>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="confirm" name="confirm"
                           placeholder="Repeat your password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('confirm', this)" aria-label="Toggle password visibility">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fa-solid fa-shield-halved"></i> Update Password
            </button>
        </form>
    </div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const icon  = btn.querySelector('i');
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            icon.className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function checkStrength(val) {
            const bar = document.getElementById('strength-bar');
            bar.className = 'strength-bar';
            if (val.length === 0) return;
            const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/.test(val);
            const medium = /^(?=.*[a-zA-Z])(?=.*\d).{8,}$/.test(val);
            if (strong)       bar.classList.add('strong');
            else if (medium)  bar.classList.add('medium');
            else              bar.classList.add('weak');
        }
    </script>
</body>
</html>
