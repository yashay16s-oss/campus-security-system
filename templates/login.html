{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}
{% block banner %}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo-badge" style="background:#0A2952;">
        <span class="logo-badge-text">ScratchXI</span>
      </div>
      <span class="auth-logo-wordmark">Scratch<span>XI</span></span>
    </div>

    <div class="auth-card">
      <h1 class="auth-card-title">Welcome back</h1>
      <p class="auth-card-sub">Sign in to the ScratchXI campus security platform</p>

      <form method="POST" action="/login" class="form-section">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required autofocus>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-brand btn-full btn-lg" style="margin-top:.25rem;">
          Sign in →
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="{{ url_for('index') }}" class="btn btn-outline btn-sm" style="margin-bottom:.65rem;width:100%;justify-content:center;">← Back to Home</a>
      <div style="display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;font-size:.82rem;">
        <span style="color:var(--text-3);">No account?</span>
        <a href="{{ url_for('register') }}" class="btn btn-outline btn-sm">Create account →</a>
      </div>
      <div style="margin-top:.65rem;display:flex;align-items:center;justify-content:center;gap:1rem;font-size:.80rem;">
        <a href="{{ url_for('forgot_password') }}" style="color:var(--text-3);text-decoration:none;">Forgot password?</a>
      </div>
    </div>

    <!-- Subtle admin entry point -->
    <div style="text-align:center;margin-top:.85rem;">
      <a href="{{ url_for('admin_login') }}"
         style="font-size:.72rem;color:var(--text-3);text-decoration:none;
                padding:.3rem .7rem;border-radius:4px;
                border:1px solid var(--border);transition:color .15s,border-color .15s;"
         onmouseover="this.style.color='var(--brand)';this.style.borderColor='var(--brand)';"
         onmouseout="this.style.color='var(--text-3)';this.style.borderColor='var(--border)';">
        Admin Login
      </a>
    </div>

  </div>
</div>
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = hidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
</script>
{% endblock %}
